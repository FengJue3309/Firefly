<!-- 网站底部徽章栏 -->
<div class="footer col-span-1 onload-animation md:col-start-2 md:col-span-1 xl:col-start-2 xl:col-span-1">
  <div class="transition border-t border-black/10 dark:border-white/15 my-10 border-dashed mx-32"></div>
  <div class="transition border-dashed border-[oklch(85%_0.01_var(--hue))] dark:border-white/15 rounded-2xl mb-12 flex flex-col items-center justify-center px-6">
    <div class="transition text-50 text-sm text-center">
      <div class="mb-2">
        
        <!-- 徽章容器 -->
        <div class="footer-badges-container">
          <div class="badges-wrapper">
            
            <!-- 1. IPv6 -->
            <a id="badge-ipv6" href="#" target="_blank" rel="noopener noreferrer" class="badge-item" title="本站支持IPv6访问">
              <img src="https://static.ipw.cn/icon/ipv6-s1.svg" alt="IPv6 Supported" loading="lazy" />
            </a>

            <!-- 2. SSL -->
            <a id="badge-ssl" href="#" target="_blank" rel="noopener noreferrer" class="badge-item" title="本站支持SSL安全访问">
              <img src="https://static.ipw.cn/icon/ssl-s1.svg" alt="SSL Secure" loading="lazy" />
            </a>

            <!-- 3. 服务器图标 -->
            <div class="badge-item server-badge" title="Server Infrastructure">
              <img src="/favicon/esa.svg" alt="Server Icon" class="server-icon" loading="lazy" />
            </div>

            <!-- 4. HTTP/3 -->
            <a id="badge-http3" href="#" target="_blank" rel="noopener noreferrer" class="badge-item" title="检查 HTTP/3 支持">
              <img id="img-http3" src="" alt="HTTP/3 Supported" loading="lazy" style="height: 24px;" />
            </a>

            <!-- 5. 域名年龄 -->
            <a id="badge-age" href="#" target="_blank" rel="noopener noreferrer" class="badge-item" title="域名年龄查询">
              <img id="img-age" src="" alt="Domain Age" loading="lazy" style="height: 24px;" />
            </a>

            <!-- 6. ICP 备案 -->
            <a href="https://beian.miit.gov.cn/" target="_blank" rel="nofollow noopener" class="badge-item icp-badge" title="ICP 备案查询">
              <img src="/favicon/icp.svg" alt="ICP Icon" class="icp-icon" loading="lazy" />
              <span class="icp-text">陕ICP备2023002152号</span>
            </a>

          </div>
        </div>

      </div>
      <!-- 注意：此处已删除版权文字和 Powered by 链接 -->
    </div>
  </div>
</div>

<!-- 样式部分 -->
<style>
  .footer-badges-container { width: 100%; display: flex; justify-content: center; padding: 1rem 0; margin-top: 1rem; }
  .badges-wrapper { display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 12px; max-width: 100%; }
  .badge-item { display: flex; align-items: center; justify-content: center; transition: opacity 0.2s ease, transform 0.2s ease; text-decoration: none; color: inherit; }
  .badge-item:hover { opacity: 0.8; transform: translateY(-1px); }
  .badge-item img { display: block; height: 24px; width: auto; vertical-align: middle; }
  .icp-badge { gap: 6px; font-size: 0.85rem; line-height: 1.5; }
  .icp-badge:hover .icp-text { text-decoration: underline; }
  .icp-icon { height: 18px !important; width: auto; }
  .icp-text { white-space: nowrap; }
  .server-badge img { height: 16px !important; width: auto; opacity: 0.9; }
  @media (max-width: 640px) { .badges-wrapper { gap: 10px 15px; } .badge-item img { height: 22px; } .server-badge img { height: 14px !important; } }
</style>

<!-- 核心脚本：自动检测域名并填充链接 -->
<script>
  (function() {
    // 1. 自动获取当前域名
    const currentDomain = window.location.hostname;
    
    // 2. 更新各个徽章的链接
    const ipv6Link = document.getElementById('badge-ipv6');
    const sslLink = document.getElementById('badge-ssl');
    const http3Link = document.getElementById('badge-http3');
    const ageLink = document.getElementById('badge-age');

    if(ipv6Link) ipv6Link.href = `https://ipw.cn/ipv6webcheck/?site=${currentDomain}`;
    if(sslLink) sslLink.href = `https://ipw.cn/ssl/?site=${currentDomain}`;
    if(http3Link) http3Link.href = `https://http3.wcode.net/?q=${currentDomain}`;
    if(ageLink) ageLink.href = `https://14.cx/${currentDomain}`;

    // 3. 更新图片地址
    const imgHttp3 = document.getElementById('img-http3');
    const imgAge = document.getElementById('img-age');

    if(imgHttp3) imgHttp3.src = `https://http3.wcode.net/badges/http3.svg?host=${currentDomain}`;
    if(imgAge) imgAge.src = `https://14.cx/api/badge/domain-age/${currentDomain}?theme=green&lang=zh&size=small&mode=light`;

  })();
</script>
