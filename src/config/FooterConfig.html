---
// 这里是 Astro 的脚本区（Frontmatter）
// 定义变量，Astro 会自动将这些数据“内联”到 HTML 中，无需担心 JS 不执行。
const currentDomain = Astro.site.hostname; // Astro 自动读取配置中的网站地址
const备案号 = '陕ICP备2023002152号'; // 修改这里为你自己的备案号
---

<!-- 网站底部徽章栏 -->
<div class="footer col-span-1 onload-animation md:col-start-2 md:col-span-1 xl:col-start-2 xl:col-span-1">
  <div class="transition border-t border-black/10 dark:border-white/15 my-10 border-dashed mx-32"></div>
  <div class="transition border-dashed border-[oklch(85%_0.01_var(--hue))] dark:border-white/15 rounded-2xl mb-12 flex flex-col items-center justify-center px-6">
    <div class="transition text-50 text-sm text-center">
      <div class="mb-2">
        <!-- HTML 结构保持不变，但将动态部分用 `{}` 插入 -->
        <div class="footer-badges-container">
          <div class="badges-wrapper">
            
            <!-- 1. IPv6 支持 -->
            <a href={`https://ipw.cn/ipv6webcheck/?site=${currentDomain}`} 
               title="本站支持IPv6访问" 
               target="_blank" 
               rel="noopener noreferrer" 
               class="badge-item">
              <img src="https://static.ipw.cn/icon/ipv6-s1.svg" alt="IPv6 Supported" loading="lazy" />
            </a>

            <!-- 2. SSL 安全 -->
            <a href={`https://ipw.cn/ssl/?site=${currentDomain}`} 
               title="本站支持SSL安全访问" 
               target="_blank" 
               rel="noopener noreferrer" 
               class="badge-item">
              <img src="https://static.ipw.cn/icon/ssl-s1.svg" alt="SSL Secure" loading="lazy" />
            </a>

            <!-- 3. HTTP/3 支持 -->
            <a href={`https://http3.wcode.net/?q=${currentDomain}`} 
               title="检查 HTTP/3 支持" 
               target="_blank" 
               rel="noopener noreferrer" 
               class="badge-item">
              <img src={`https://http3.wcode.net/badges/http3.svg?host=${currentDomain}`} alt="HTTP/3 Supported" loading="lazy" style="height: 24px;" />
            </a>

            <!-- 4. 域名年龄 -->
            <a href={`https://14.cx/${currentDomain}`} 
               title="域名年龄查询" 
               target="_blank" 
               rel="noopener noreferrer" 
               class="badge-item">
              <img src={`https://14.cx/api/badge/domain-age/${currentDomain}?theme=green&lang=zh&size=small&mode=light`} alt="Domain Age" loading="lazy" style="height: 24px;" />
            </a>
            
            <!-- 5. 服务器图标 (ESA) -->
            <div class="badge-item server-badge" title="Server Infrastructure">
              <img src="/favicon/esa.svg" alt="Server Icon" class="server-icon" loading="lazy" />
            </div>

            <!-- 6. ICP 备案 (带图标) -->
            <a href="https://beian.miit.gov.cn/" 
               target="_blank" 
               rel="nofollow noopener" 
               class="badge-item icp-badge"
               title="ICP 备案查询">
              <img src="/favicon/icp.svg" alt="ICP Icon" class="icp-icon" loading="lazy" />
              <span class="icp-text">{备案号}</span>
            </a>

          </div>
        </div>
      </div>

      <div class="m-0.5">
        © <span id="copyright-year">2026</span> 枫诀宝贝. All Rights Reserved. /
        <a class="transition link text-(--primary) font-medium" target="_blank" href="/rss.xml">RSS</a> /
        <a class="transition link text-(--primary) font-medium" target="_blank" href="/sitemap-index.xml">Sitemap</a>
      </div>

      <div class="m-0.5">
        Powered by
        <a class="transition link text-(--primary) font-medium" target="_blank" href="https://astro.build">Astro</a> &
        <a class="transition link text-(--primary) font-medium" target="_blank" href="https://github.com/CuteLeaf/Firefly">Firefly</a>
      </div>
    </div>
  </div>
</div>

<!-- 样式保持不变 -->
<style>
  /* 保留原有样式不变 */
  .footer-badges-container {
    width: 100%;
    display: flex;
    justify-content: center;
    padding: 1rem 0;
    margin-top: 1rem;
  }

  .badges-wrapper {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 12px;
    max-width: 100%;
  }

  .badge-item {
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.2s ease, transform 0.2s ease;
    text-decoration: none;
    color: inherit;
  }

  .badge-item:hover {
    opacity: 0.8;
    transform: translateY(-1px);
  }

  .badge-item img {
    display: block;
    height: 24px;
    width: auto;
    vertical-align: middle;
  }

  /* ICP 特殊样式 */
  .icp-badge {
    gap: 6px;
    font-size: 0.85rem;
    line-height: 1.5;
  }
  
  .icp-badge:hover .icp-text {
    text-decoration: underline;
  }

  .icp-icon {
    height: 18px !important;
    width: auto;
  }

  .icp-text {
    white-space: nowrap;
  }

  /* 服务器图标特殊样式 */
  .server-badge img {
    height: 16px !important;
    width: auto;
    opacity: 0.9;
  }

  /* 移动端适配 */
  @media (max-width: 640px) {
    .badges-wrapper {
      gap: 10px 15px;
    }
    .badge-item img {
      height: 22px;
    }
    .server-badge img {
      height: 14px !important;
    }
  }
</style>
